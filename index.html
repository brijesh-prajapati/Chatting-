<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatBlink UI</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #1a1a24; padding: 15px; font-size: 18px; font-weight: bold; border-bottom: 1px solid #27273a; }
        .feed { flex: 1; overflow-y: auto; background: #05050a; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; word-break: break-all; font-size: 15px; line-height: 1.4; }
        .msg.me { background: #1f1f30; align-self: flex-end; color: #fff; border-bottom-right-radius: 2px; }
        .msg.stranger { background: #2a2a35; align-self: flex-start; color: #5bc0be; border-bottom-left-radius: 2px; }
        .tray { position: fixed; bottom: 0; left: 0; width: 100%; background: #111118; display: flex; gap: 8px; padding: 12px; border-top: 1px solid #27273a; z-index: 9999; }
        .tray input { flex: 1; padding: 14px; background: #05050a; border: 1px solid #3b3b4f; color: #fff; border-radius: 8px; font-size: 15px; outline: none; }
        .tray button { background: #ff5b7f; color: #fff; border: none; padding: 0 22px; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="header">
        <span style="color:#5bc0be">chat</span><span style="color:#ff5b7f">blink</span> 💬
    </div>

    <div class="feed" id="feed">
        <div class="msg stranger">Connected with AutoBot_AI. Type below to send data...</div>
    </div>

    <form class="tray" id="form" onsubmit="sendPayload(event)">
        <input type="text" id="ans" placeholder="Type message here..." autocomplete="off" required>
        <button type="submit">Send</button>
    </form>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        function sendPayload(e) {
            e.preventDefault();
            const input = document.getElementById('ans');
            const val = input.value.trim();
            if (!val) return;
            
            // Add bubble to display area instantly 
            const feed = document.getElementById('feed');
            const b = document.createElement('div');
            b.className = "msg me";
            b.textContent = val;
            feed.appendChild(b);
            feed.scrollTop = feed.scrollHeight;
            
            input.value = '';

            // Send raw text string straight to Pydroid thread backend
            if (tg) {
                tg.sendData(val);
            }
        }
    </script>
</body>
</html>
