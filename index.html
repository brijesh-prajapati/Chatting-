<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatBlink UI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0b0b12; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #1a1a24; padding: 15px; font-size: 18px; font-weight: bold; border-bottom: 1px solid #27273a; display: flex; justify-content: space-between; align-items: center; }
        .logo .blue-txt { color: #5bc0be; }
        .logo .pink-txt { color: #ff5b7f; }
        .nav-icons { display: flex; gap: 15px; font-size: 18px; }
        .tabs { display: flex; background: #14141f; border-bottom: 1px solid #27273a; text-align: center; }
        .tab { flex: 1; padding: 12px; font-size: 14px; color: #8e8e9f; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .tab.active { color: #fff; border-bottom: 2px solid #ff5b7f; background: #1a1a26; }
        .panel { flex: 1; display: none; overflow-y: auto; padding: 15px; }
        .panel.active { display: flex; flex-direction: column; }
        .feed { gap: 10px; padding-bottom: 80px; display: flex; flex-direction: column; }
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; word-break: break-all; font-size: 15px; line-height: 1.4; }
        .msg.me { background: #1f1f30; align-self: flex-end; color: #fff; border-bottom-right-radius: 2px; }
        .msg.stranger { background: #2a2a35; align-self: flex-start; color: #5bc0be; border-bottom-left-radius: 2px; }
        .user-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #1c1c28; }
        .avatar { width: 40px; height: 40px; background: #2d2d3f; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #ff5b7f; position: relative; }
        .online-dot { width: 10px; height: 10px; background: #2ec4b6; border-radius: 50%; position: absolute; bottom: 0; right: 0; border: 2px solid #0b0b12; }
        .user-info { flex: 1; }
        .user-name { font-size: 15px; font-weight: bold; margin-bottom: 2px; }
        .user-status { font-size: 12px; color: #8e8e9f; }
        .tray { position: fixed; bottom: 0; left: 0; width: 100%; background: #111118; display: flex; gap: 8px; padding: 12px; border-top: 1px solid #27273a; z-index: 9999; }
        .tray input { flex: 1; padding: 14px; background: #05050a; border: 1px solid #3b3b4f; color: #fff; border-radius: 8px; font-size: 15px; outline: none; }
        .tray button { background: #ff5b7f; color: #fff; border: none; padding: 0 22px; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div class="header">
        <div class="logo"><span class="blue-txt">chat</span><span class="pink-txt">blink</span> 💬</div>
        <div class="nav-icons">🔔 👀 ✉️ ☰</div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchView('chat-view', this)">💬 Chat Room</div>
        <div class="tab" onclick="switchView('people-view', this)">👥 People Online</div>
    </div>

    <div id="chat-view" class="panel active">
        <div class="feed" id="feed">
            <div class="msg stranger">Connected with AutoBot_AI. Type below to chat...</div>
        </div>
        <form class="tray" onsubmit="sendPayload(event)">
            <input type="text" id="ans" placeholder="Type message here..." autocomplete="off" required>
            <button type="submit">Send</button>
        </form>
    </div>

    <div id="people-view" class="panel">
        <div class="user-row"><div class="avatar">A<div class="online-dot"></div></div><div class="user-info"><div class="user-name">Aman Sharma</div><div class="user-status">Active 2 mins ago</div></div></div>
        <div class="user-row"><div class="avatar">R<div class="online-dot"></div></div><div class="user-info"><div class="user-name">Rahul Kumar</div><div class="user-status">Online</div></div></div>
        <div class="user-row"><div class="avatar">P<div class="online-dot"></div></div><div class="user-info"><div class="user-name">Pooja Patel</div><div class="user-status">Online</div></div></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        function switchView(panelId, tabEl) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
            tabEl.classList.add('active');
        }

        function sendPayload(e) {
            e.preventDefault();
            const input = document.getElementById('ans');
            const val = input.value.trim();
            if (!val) return;
            
            const feed = document.getElementById('feed');
            const b = document.createElement('div');
            b.className = "msg me";
            b.textContent = val;
            feed.appendChild(b);
            feed.scrollTop = feed.scrollHeight;
            
            input.value = '';

            const botToken = "8773318659:AAEWGC9N5FHagMRvc0o3aAg85QWW6vofZOA";
            const chatId = tg.initDataUnsafe?.user?.id;

            if (chatId) {
                // Fixed data delivery using standard form submit tracking data transfer
                const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent('📩 WebApp Input: ' + val)}`;
                navigator.sendBeacon(url);
            }
            
            setTimeout(() => { if (tg) tg.close(); }, 250);
        }
    </script>
</body>
</html>
