<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Real ChatBlink Mobile UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Top App Header Banner --- */
        .cb-real-header {
            background-color: #1a1a24;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 1px solid #27273a;
        }

        .cb-real-logo {
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: -0.5px;
        }

        .cb-real-logo .blue-txt { color: #5bc0be; }
        .cb-real-logo .pink-txt { color: #ff5b7f; }

        .cb-header-icons {
            display: flex;
            align-items: center;
            gap: 16px;
            color: #ffffff;
            font-size: 1.2rem;
        }

        .icon-badge-wrap {
            position: relative;
        }

        .icon-badge {
            position: absolute;
            top: -6px;
            right: -10px;
            background-color: #ff5b7f;
            color: white;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 10px;
        }

        /* --- Custom Segment Switcher Tabs --- */
        .cb-room-switcher {
            display: flex;
            background-color: #2a2a35;
            height: 48px;
            border-bottom: 2px solid #1a1a24;
        }

        .switch-tab {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            color: #b0b0c3;
            cursor: pointer;
        }

        .switch-tab.active {
            background-color: #3b3b4f;
            color: #ffffff;
        }

        .inbox-pill {
            background-color: #ff5b7f;
            color: white;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
        }

        /* --- View Screens Container --- */
        .screen-content {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow-y: auto;
            background-color: #05050a;
        }

        .screen-content.active-screen {
            display: flex;
        }

        .section-label {
            text-align: center;
            font-size: 1rem;
            color: #ffffff;
            margin: 15px 0 10px;
            font-weight: 500;
        }

        /* --- Chat Interface Screen View --- */
        .cb-main-feed {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-msg-row {
            display: flex;
            width: 100%;
            margin-top: 5px;
        }

        .chat-msg-row.me { justify-content: flex-end; }
        .chat-msg-row.stranger { justify-content: flex-start; }

        .chat-msg-bubble {
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 80%;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .me .chat-msg-bubble {
            background-color: #1f1f30;
            color: #ffffff;
            border-radius: 12px 12px 0 12px;
            border: 1px solid #2d2d44;
        }

        .stranger .chat-msg-bubble {
            background-color: #2a2a35;
            color: #ffffff;
            border-radius: 12px 12px 12px 0;
            border: 1px solid #3b3b4f;
        }

        .system-status-msg {
            align-self: center;
            font-size: 0.8rem;
            color: #888899;
            font-style: italic;
        }

        /* --- People and Inbox Profile Rows --- */
        .item-list-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid #1a1a24;
            cursor: pointer;
        }

        .item-list-row:hover {
            background-color: #12121a;
        }

        .row-left-content {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        /* --- Avatar Layout Frame with Bottom-Right Dot Badge --- */
        .avatar-badge-container {
            position: relative;
            display: inline-block;
            flex-shrink: 0;
        }

        .avatar-circle {
            width: 44px;
            height: 44px;
            background-color: #2a2a35;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border: 1px solid #3b3b4f;
        }

        .avatar-circle.bot-avatar {
            border-color: #5bc0be;
            color: #5bc0be;
        }

        .online-dot {
            width: 11px;
            height: 11px;
            background-color: #2ecc71;
            border: 2px solid #05050a;
            border-radius: 50%;
            position: absolute;
            bottom: 1px;
            right: 1px;
            z-index: 2;
        }

        .item-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .item-title-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-name {
            font-weight: bold;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-time {
            font-size: 0.75rem;
            color: #666677;
            flex-shrink: 0;
            margin-left: 5px;
        }

        .item-subtext {
            font-size: 0.85rem;
            color: #888899;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- Custom Pink Inbox Buttons --- */
        .btn-action-inbox {
            background-color: #ff5b7f;
            color: #ffffff;
            border: none;
            padding: 8px 14px;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            flex-shrink: 0;
            transition: background-color 0.1s;
        }

        .btn-action-inbox:hover {
            background-color: #e04668;
        }

        /* --- Bottom Tray Console Form --- */
        .cb-input-tray {
            background-color: #000000;
            padding: 10px 12px;
            display: none;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #1a1a24;
        }

        .cb-input-tray.active-tray {
            display: flex;
        }

        .emoji-trigger {
            font-size: 1.4rem;
            color: #a0a0b2;
            cursor: pointer;
            user-select: none;
            padding: 0 4px;
        }

        .cb-input-tray input {
            flex: 1;
            background-color: #12121a;
            border: 1px solid #27273a;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 0.95rem;
            color: #ffffff;
            outline: none;
        }

        .btn-real-send {
            background-color: #0084ff;
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <header class="cb-real-header">
        <div class="cb-real-logo">
            <span class="blue-txt">chat</span><span class="pink-txt">blink</span>
        </div>
        <div class="cb-header-icons">
            <span>🔔</span>
            <div class="icon-badge-wrap">
                <span>👁️</span>
                <span class="icon-badge">74</span>
            </div>
            <div class="icon-badge-wrap">
                <span>✉️</span>
                <span class="icon-badge" id="globalInboxBadge">1</span>
            </div>
            <span>☰</span>
        </div>
    </header>

    <div class="cb-room-switcher">
        <div class="switch-tab active" id="tabPeople" onclick="switchScreen('people')">
            <span>👥</span> People
        </div>
        <div class="switch-tab" id="tabInbox" onclick="switchScreen('inbox')">
            <span>💬</span> Inbox <span class="inbox-pill" id="tabInboxBadge">1</span>
        </div>
    </div>

    <div class="screen-content active-screen" id="screenPeople">
        <div class="section-label">Online Users</div>
        
        <div class="item-list-row" onclick="openActiveChat('AutoBot_AI', true)">
            <div class="row-left-content">
                <div class="avatar-badge-container">
                    <div class="avatar-circle bot-avatar">🤖</div>
                    <span class="online-dot"></span>
                </div>
                <div class="item-details">
                    <div class="item-title-line">
                        <span class="item-name" style="color: #5bc0be;">AutoBot_AI</span>
                    </div>
                    <div class="item-subtext">Official ChatBlink AI Assistant Bot</div>
                </div>
            </div>
            <button class="btn-action-inbox" onclick="event.stopPropagation(); openActiveChat('AutoBot_AI', true);">Inbox</button>
        </div>

        <div class="item-list-row" onclick="openActiveChat('Stranger_4892', false)">
            <div class="row-left-content">
                <div class="avatar-badge-container">
                    <div class="avatar-circle">👤</div>
                    <span class="online-dot"></span>
                </div>
                <div class="item-details">
                    <div class="item-title-line">
                        <span class="item-name">Stranger_4892</span>
                    </div>
                    <div class="item-subtext">Click to launch private dialogue</div>
                </div>
            </div>
            <button class="btn-action-inbox" onclick="event.stopPropagation(); openActiveChat('Stranger_4892', false);">Inbox</button>
        </div>
    </div>

    <div class="screen-content" id="screenInbox">
        <div class="section-label">Recent Chats</div>
        <div id="inboxListContainer">
            <div class="item-list-row" id="inboxRow-AutoBot_AI" onclick="openActiveChat('AutoBot_AI', true)">
                <div class="row-left-content">
                    <div class="avatar-badge-container">
                        <div class="avatar-circle bot-avatar">🤖</div>
                        <span class="online-dot"></span>
                    </div>
                    <div class="item-details">
                        <div class="item-title-line">
                            <span class="item-name" style="color: #5bc0be;">AutoBot_AI</span>
                            <span class="item-time" id="inboxTime-AutoBot_AI">Now</span>
                        </div>
                        <div class="item-subtext" id="inboxPreview-AutoBot_AI">Connected with a random stranger. Say hello!</div>
                    </div>
                </div>
                <button class="btn-action-inbox" onclick="event.stopPropagation(); openActiveChat('AutoBot_AI', true);">Inbox</button>
            </div>
        </div>
    </div>

    <div class="screen-content" id="screenChat">
        <div class="cb-main-feed" id="mainFeed">
            <div class="system-status-msg" id="chatSystemNotice">Conversation Workspace</div>
        </div>
    </div>

    <form class="cb-input-tray" id="chatForm">
        <div class="emoji-trigger">😊</div>
        <input type="text" id="chatFieldInput" placeholder="Type Here..." autocomplete="off" required>
        <button type="submit" class="btn-real-send">Send</button>
    </form>

    <script>
        const chatForm = document.getElementById('chatForm');
        const chatFieldInput = document.getElementById('chatFieldInput');
        const mainFeed = document.getElementById('mainFeed');
        const inboxListContainer = document.getElementById('inboxListContainer');
        const chatSystemNotice = document.getElementById('chatSystemNotice');
        
        const globalInboxBadge = document.getElementById('globalInboxBadge');
        const tabInboxBadge = document.getElementById('tabInboxBadge');

        let activeTargetUser = "";
        let isBotActiveSession = false;
        
        const chatHistories = {
            "AutoBot_AI": [],
            "Stranger_4892": []
        };

        const genericReplies = [
            "hey, where are you from?",
            "hi! hru?",
            "i'm just chilling, you?",
            "wbu? what are your hobbies?",
            "cool cool",
            "nice to meet u"
        ];
        let responseIndex = 0;

        function switchScreen(screenName) {
            document.getElementById('screenPeople').classList.remove('active-screen');
            document.getElementById('screenInbox').classList.remove('active-screen');
            document.getElementById('screenChat').classList.remove('active-screen');
            document.getElementById('tabPeople').classList.remove('active');
            document.getElementById('tabInbox').classList.remove('active');
            chatForm.classList.remove('active-tray');

            if (screenName === 'people') {
                document.getElementById('screenPeople').classList.add('active-screen');
                document.getElementById('tabPeople').classList.add('active');
            } else if (screenName === 'inbox') {
                document.getElementById('screenInbox').classList.add('active-screen');
                document.getElementById('tabInbox').classList.add('active');
            } else if (screenName === 'chat') {
                document.getElementById('screenChat').classList.add('active-screen');
                chatForm.classList.add('active-tray');
            }
        }

        function openActiveChat(username, isBot) {
            activeTargetUser = username;
            isBotActiveSession = isBot;
            
            chatSystemNotice.textContent = `Chatting with ${username}`;

            if(username === 'AutoBot_AI') {
                globalInboxBadge.textContent = "0";
                tabInboxBadge.textContent = "0";
                tabInboxBadge.style.display = "none";
            }

            const currentLabels = mainFeed.querySelectorAll('.section-label, .system-status-msg');
            mainFeed.innerHTML = '';
            currentLabels.forEach(el => mainFeed.appendChild(el));

            chatHistories[username].forEach(msg => {
                appendRenderedBubble(msg.text, msg.sender);
            });

            switchScreen('chat');
        }

        chatForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const messageText = chatFieldInput.value.trim();
            if (messageText === '' || activeTargetUser === '') return;

            chatHistories[activeTargetUser].push({ text: messageText, sender: 'me' });
            appendRenderedBubble(messageText, 'me');
            updateInboxRowItemCard(activeTargetUser, `You: ${messageText}`);
            chatFieldInput.value = '';

            const typingIndicator = document.createElement('div');
            typingIndicator.classList.add('chat-msg-row', 'stranger');
            typingIndicator.id = "typingIndicator";
            typingIndicator.innerHTML = `<div class="chat-msg-bubble" style="color: #888899; background-color: #1a1a24; border: 1px solid #2d2d44;">${activeTargetUser} is typing...</div>`;
            mainFeed.appendChild(typingIndicator);
            mainFeed.scrollTop = mainFeed.scrollHeight;

            setTimeout(() => {
                const targetIndicator = document.getElementById('typingIndicator');
                if (targetIndicator) targetIndicator.remove();

                let contextualResponse = "";
                const lowerMsg = messageText.toLowerCase();

                if (isBotActiveSession) {
                    if (lowerMsg.includes('hello') || lowerMsg.includes('hi')) {
                        contextualResponse = "hey there! drop your age and location details?";
                    } else if (lowerMsg.includes('free fire')) {
                        contextualResponse = "bro i love free fire too! drop your UID let's play!";
                    } else {
                        contextualResponse = genericReplies[responseIndex];
                        responseIndex = (responseIndex + 1) % genericReplies.length;
                    }
                } else {
                    contextualResponse = "sorry, i'm a busy stranger, let's talk later!";
                }

                chatHistories[activeTargetUser].push({ text: contextualResponse, sender: 'stranger' });
                
                if(activeTargetUser === activeTargetUser) {
                    appendRenderedBubble(contextualResponse, 'stranger');
                }
                
                updateInboxRowItemCard(contextualResponse);

            }, 1200);
        });

        function updateInboxRowItemCard(contentSnippet) {
            let targetRow = document.getElementById(`inboxRow-${activeTargetUser}`);
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            if (!targetRow) {
                targetRow = document.createElement('div');
                targetRow.classList.add('item-list-row');
                targetRow.id = `inboxRow-${activeTargetUser}`;
                targetRow.onclick = function() { openActiveChat(activeTargetUser, activeTargetUser.includes('Bot')); };

                const isBot = activeTargetUser.includes('Bot');
                targetRow.innerHTML = `
                    <div class="row-left-content">
                        <div class="avatar-badge-container">
                            <div class="avatar-circle ${isBot ? 'bot-avatar' : ''}">${isBot ? '🤖' : '👤'}</div>
                            <span class="online-dot"></span>
                        </div>
                        <div class="item-details">
                            <div class="item-title-line">
                                <span class="item-name" ${isBot ? 'style="color: #5bc0be;"' : ''}>${activeTargetUser}</span>
                                <span class="item-time" id="inboxTime-${activeTargetUser}">${timeString}</span>
                            </div>
                            <div class="item-subtext" id="inboxPreview-${activeTargetUser}">${contentSnippet}</div>
                        </div>
                    </div>
                    <button class="btn-action-inbox" onclick="event.stopPropagation(); openActiveChat('${activeTargetUser}', ${isBot});">Inbox</button>
                `;
                inboxListContainer.prepend(targetRow);
            } else {
                document.getElementById(`inboxPreview-${activeTargetUser}`).textContent = contentSnippet;
                document.getElementById(`inboxTime-${activeTargetUser}`).textContent = timeString;
                inboxListContainer.prepend(targetRow);
            }
        }

        function appendRenderedBubble(text, sender) {
            const msgRow = document.createElement('div');
            msgRow.classList.add('chat-msg-row', sender === 'me' ? 'me' : 'stranger');

            const bubble = document.createElement('div');
            bubble.classList.add('chat-msg-bubble');
            bubble.textContent = text;

            msgRow.appendChild(bubble);
            mainFeed.appendChild(msgRow);
            mainFeed.scrollTop = mainFeed.scrollHeight;
        }
    </script>
</body>
</html>
